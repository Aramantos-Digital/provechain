<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProveChain Logo Exporter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #1f2937;
      margin-bottom: 10px;
      font-size: 2em;
    }

    p {
      color: #6b7280;
      margin-bottom: 30px;
    }

    .preview-section {
      background: #f9fafb;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
    }

    .preview-section h2 {
      color: #1f2937;
      margin-bottom: 20px;
      font-size: 1.2em;
    }

    #logoPreview {
      margin: 20px 0;
      display: inline-block;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .control-group {
      background: #f9fafb;
      padding: 20px;
      border-radius: 12px;
    }

    label {
      display: block;
      color: #374151;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9em;
    }

    input[type="number"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #8b5cf6;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .preset-btn {
      padding: 10px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      color: #6b7280;
    }

    .preset-btn:hover {
      background: #8b5cf6;
      color: white;
      border-color: #8b5cf6;
      transform: translateY(-2px);
    }

    .download-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .info-box {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .info-box p {
      color: #1e40af;
      margin: 0;
      font-size: 0.9em;
    }

    @media (max-width: 640px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .preset-buttons {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 ProveChain Logo Exporter</h1>
    <p>Export your logo at any size. Perfect for watermarks, favicons, and social media!</p>

    <div class="preview-section">
      <h2>Preview</h2>
      <div id="logoPreview"></div>
      <p style="color: #6b7280; font-size: 0.9em; margin-top: 10px;">
        Output: <strong id="outputSize">512x512px</strong>
      </p>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="logoType">Logo Type</label>
        <select id="logoType" onchange="updatePreview()">
          <option value="icon">Icon Only</option>
          <option value="full">Full Logo with Text</option>
        </select>
      </div>

      <div class="control-group">
        <label for="size">Size (px)</label>
        <input type="number" id="size" value="512" min="64" max="4096" step="64" onchange="updatePreview()">
      </div>
    </div>

    <div class="preset-buttons">
      <button class="preset-btn" onclick="setSize(128)">Small<br>128px</button>
      <button class="preset-btn" onclick="setSize(256)">Medium<br>256px</button>
      <button class="preset-btn" onclick="setSize(512)">Large<br>512px</button>
      <button class="preset-btn" onclick="setSize(1024)">XL<br>1024px</button>
      <button class="preset-btn" onclick="setSize(2048)">XXL<br>2048px</button>
      <button class="preset-btn" onclick="setSize(64)">Favicon<br>64px</button>
    </div>

    <button class="download-btn" onclick="downloadLogo()">
      ⬇️ Download PNG
    </button>

    <div class="info-box">
      <p><strong>💡 Tip:</strong> For watermarks, use 128-512px. For print, use 2048px or higher. SVG files scale infinitely!</p>
    </div>
  </div>

  <script>
    const iconSVG = `<svg width="{size}" height="{size}" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hexGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8B5CF6" />
          <stop offset="100%" stop-color="#EC4899" />
        </linearGradient>
        <linearGradient id="hexGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#06B6D4" />
          <stop offset="100%" stop-color="#8B5CF6" />
        </linearGradient>
        <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3" />
          <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.2" />
          <stop offset="100%" stop-color="#EC4899" stop-opacity="0.3" />
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="45" stroke="url(#glowGradient)" stroke-width="1" fill="none" opacity="0.3" />
      <circle cx="50" cy="50" r="48" stroke="url(#glowGradient)" stroke-width="0.5" fill="none" opacity="0.2" />
      <path d="M 50 10 L 70 25 L 70 55 L 50 70 L 30 55 L 30 25 Z" fill="url(#hexGradient1)" opacity="0.8" />
      <path d="M 50 30 L 70 45 L 70 75 L 50 90 L 30 75 L 30 45 Z" fill="url(#hexGradient2)" opacity="0.9" />
      <line x1="50" y1="10" x2="50" y2="30" stroke="#8B5CF6" stroke-width="2" opacity="0.6" />
      <line x1="30" y1="55" x2="30" y2="75" stroke="#06B6D4" stroke-width="2" opacity="0.6" />
      <line x1="70" y1="55" x2="70" y2="75" stroke="#EC4899" stroke-width="2" opacity="0.6" />
      <circle cx="50" cy="52" r="4" fill="#FFFFFF" opacity="0.9" />
      <circle cx="50" cy="52" r="6" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5" />
    </svg>`;

    const fullSVG = `<svg width="{width}" height="{height}" viewBox="0 0 500 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hexGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8B5CF6" />
          <stop offset="100%" stop-color="#EC4899" />
        </linearGradient>
        <linearGradient id="hexGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#06B6D4" />
          <stop offset="100%" stop-color="#8B5CF6" />
        </linearGradient>
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8B5CF6" />
          <stop offset="50%" stop-color="#06B6D4" />
          <stop offset="100%" stop-color="#EC4899" />
        </linearGradient>
      </defs>
      <g transform="translate(0, 0)">
        <circle cx="50" cy="50" r="45" stroke="url(#hexGradient1)" stroke-width="1" fill="none" opacity="0.2" />
        <path d="M 50 10 L 70 25 L 70 55 L 50 70 L 30 55 L 30 25 Z" fill="url(#hexGradient1)" opacity="0.8" />
        <path d="M 50 30 L 70 45 L 70 75 L 50 90 L 30 75 L 30 45 Z" fill="url(#hexGradient2)" opacity="0.9" />
        <line x1="50" y1="10" x2="50" y2="30" stroke="#8B5CF6" stroke-width="2" opacity="0.6" />
        <line x1="30" y1="55" x2="30" y2="75" stroke="#06B6D4" stroke-width="2" opacity="0.6" />
        <line x1="70" y1="55" x2="70" y2="75" stroke="#EC4899" stroke-width="2" opacity="0.6" />
        <circle cx="50" cy="52" r="4" fill="#FFFFFF" opacity="0.9" />
        <circle cx="50" cy="52" r="6" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5" />
      </g>
      <text x="120" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#textGradient)">ProveChain</text>
    </svg>`;

    function updatePreview() {
      const type = document.getElementById('logoType').value;
      const size = parseInt(document.getElementById('size').value);
      const preview = document.getElementById('logoPreview');

      if (type === 'icon') {
        preview.innerHTML = iconSVG.replace(/{size}/g, size);
        document.getElementById('outputSize').textContent = `${size}x${size}px`;
      } else {
        const width = size * 5;
        const height = size;
        preview.innerHTML = fullSVG.replace('{width}', width).replace('{height}', height);
        document.getElementById('outputSize').textContent = `${width}x${height}px`;
      }
    }

    function setSize(size) {
      document.getElementById('size').value = size;
      updatePreview();
    }

    function downloadLogo() {
      const type = document.getElementById('logoType').value;
      const size = parseInt(document.getElementById('size').value);

      let svg, width, height;

      if (type === 'icon') {
        svg = iconSVG.replace(/{size}/g, size);
        width = height = size;
      } else {
        width = size * 5;
        height = size;
        svg = fullSVG.replace('{width}', width).replace('{height}', height);
      }

      // Create canvas
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      // Convert SVG to image
      const img = new Image();
      const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function() {
        ctx.drawImage(img, 0, 0, width, height);

        // Convert canvas to PNG and download
        canvas.toBlob(function(blob) {
          const downloadUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = `provechain-${type}-${width}x${height}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(downloadUrl);
          URL.revokeObjectURL(url);
        });
      };

      img.src = url;
    }

    // Initialize
    updatePreview();
  </script>
</body>
</html>
